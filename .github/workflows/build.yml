name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install raylib
        run: |
          curl -L https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_mingw-w64.zip -o raylib.zip
          unzip raylib.zip
          dir raylib-5.0_win64_mingw-w64
          
      - name: Compile with MinGW
        run: |
          gcc src/main.c src/car.c src/camera.c -I raylib-5.0_win64_mingw-w64/include -L raylib-5.0_win64_mingw-w64/lib -lraylib -lopengl32 -lgdi32 -lwinmm -lm -o RagDrive.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RagDrive
          path: RagDrive.exe
