name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install raylib
        run: |
          curl -L https://github.com/raysan5/raylib/releases/download/5.0/raylib-5.0_win64_mingw-w64.zip -o raylib.zip
          unzip raylib.zip -d raylib
      
      - name: Compile with MinGW
        run: |
          gcc src/main.c -I raylib/include/raylib -L raylib/lib -lraylib -lopengl32 -lgdi32 -lwinmm -o RagDrive.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RagDrive
          path: RagDrive.exe
